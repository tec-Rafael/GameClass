<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrículas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-secondary">
    <div id="header"></div>
    <main class="flex-grow-1 py-5 page-bg">
        <div class="container">
            <div class="mb-4">
                <h1 class="text-light mb-1">Matrículas</h1>
                <p class="text-light mb-0">Visualize todas as matrículas ou filtre por curso.</p>
            </div>
            <div class="card shadow border-0 rounded-4 mb-4">
                <div class="card-body">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <label for="cursoIdFiltro" class="form-label">Curso ID</label>
                            <input id="cursoIdFiltro" class="form-control" type="number" min="1" placeholder="Opcional">
                        </div>
                        <div class="col-md-8 d-flex gap-2">
                            <button onclick="carregarMatriculas()" class="btn btn-primary">Buscar</button>
                            <button onclick="byId('cursoIdFiltro').value=''; carregarMatriculas();" class="btn btn-secondary">Limpar filtro</button>
                            <a href="cursos.html" class="btn btn-outline-dark">Cursos</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card shadow border-0 rounded-4">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr><th>ID</th><th>Aluno ID</th><th>Aluno</th><th>RA</th><th>Curso ID</th><th>Curso</th><th>Nota</th><th>Situação</th></tr>
                            </thead>
                            <tbody id="tabelaMatriculas"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="public/js/api.js"></script>
    <script src="public/js/matriculas.js"></script>
    <script>initLayout("matriculas"); carregarMatriculas();</script>
</body>
</html>
