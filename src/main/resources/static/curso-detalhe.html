<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-secondary">
    <div id="header"></div>
    <main class="flex-grow-1 py-5 page-bg">
        <div class="container">
            <div class="card shadow border-0 rounded-4 mb-4">
                <div class="card-body p-4">
                    <h1 id="tituloCurso" class="mb-2">Curso</h1>
                    <p id="descricaoCurso" class="text-secondary mb-2"></p>
                    <p class="mb-0"><strong>Professor:</strong> <span id="professorCurso"></span></p>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-lg-6">
                    <div class="card shadow border-0 rounded-4 h-100">
                        <div class="card-body p-4">
                            <h4>Matricular aluno</h4>
                            <form id="formMatricula" onsubmit="matricularAluno(event)">
                                <input type="hidden" id="cursoId" name="cursoId" value="0" />
                                <div class="form-group">
                                    <label for="alunoId">Aluno ID</label>
                                    <input id="alunoId" name="alunoId" class="form-control" type="number" min="1" />
                                </div>
                                <button class="btn btn-primary" type="submit">Matricular</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card shadow border-0 rounded-4 h-100">
                        <div class="card-body p-4">
                            <h4>Aplicar nota</h4>
                            <p class="small-muted">Clique em “Nota” na tabela de alunos e preencha os dados.</p>
                            <form id="formNota" onsubmit="aplicarNota(event)">
                                <input type="hidden" id="notaCursoId" name="notaCursoId" value="" />
                                <input type="hidden" id="notaAlunoId" name="notaAlunoId" value="" />
                                <div class="row">
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label for="notaProfessorId">Professor ID</label>
                                            <input id="notaProfessorId" name="notaProfessorId" class="form-control" type="number" min="1" />
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label for="nota">Nota</label>
                                            <input id="nota" name="nota" class="form-control" type="number" min="0" max="10" step="0.1" />
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-success" type="submit">Aplicar nota</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Alunos matriculados</h4>
                        <a href="cursos.html" class="btn btn-secondary btn-sm">Voltar</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>ID</th><th>Nome</th><th>RA</th><th>Nota</th><th>Situação</th><th class="text-end">Ações</th></tr></thead>
                            <tbody id="tabelaAlunosCurso"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="public/js/api.js"></script>
    <script src="public/js/cursos.js"></script>
    <script>initLayout("cursos"); carregarCursoDetalhe();</script>
</body>
</html>
