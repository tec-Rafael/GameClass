version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: escola-postgres
    restart: always
    environment:
      POSTGRES_DB: escola_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # CORRIGIDO: healthcheck adicionado para o app nao subir antes do banco estar pronto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d escola_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app_net

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: escola-pgadmin
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_net

  # CORRIGIDO: servico da aplicacao adicionado (estava faltando no original)
  app:
    build: .
    container_name: escola-api-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/escola_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8082:8082"
    networks:
      - app_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  app_net:
    driver: bridge
